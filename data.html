<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Training Tracker – Datenverwaltung</title>
    <meta name="description" content="Dart-Trainingsdaten verwalten: einzelne Würfe löschen und alle Daten als JSON-Backup exportieren.">
    <meta name="theme-color" content="#2c2c2c">
    <meta property="og:title" content="Dart Training Tracker – Datenverwaltung">
    <meta property="og:description" content="Dart-Trainingsdaten verwalten und als JSON-Backup exportieren.">
    <meta property="og:type" content="website">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-main">
        <h1 class="sr-only">Dart Training – Datenverwaltung</h1>

        <!-- Recent Throws with Delete Option -->
        <section>
            <h2>Letzte 10 Würfe</h2>
            <div class="recent-throws-list" id="recentThrowsList">
                <div class="empty-state">Lade Würfe...</div>
            </div>
            <div class="total-throws-summary" id="totalThrowsSummary">
                <!-- Wird dynamisch gefüllt -->
            </div>
        </section>

        <!-- Backup / Export -->
        <section>
            <h2>Backup</h2>
            <p class="section-hint">Alle Trainingsdaten liegen nur in diesem Browser. Regelmäßig exportieren schützt vor Datenverlust.</p>
            <button type="button" id="exportBtn" class="export-btn">Daten als JSON exportieren</button>
        </section>
    </main>

    <!-- Tab Navigation (Bottom) -->
    <nav class="tab-navigation" aria-label="Hauptnavigation">
        <a href="index.html" class="tab-item">
            <span class="tab-icon" aria-hidden="true">🎯</span>
            <span class="tab-label">Spiel</span>
        </a>
        <a href="stats.html" class="tab-item">
            <span class="tab-icon" aria-hidden="true">📊</span>
            <span class="tab-label">Statistik</span>
        </a>
        <a href="data.html" class="tab-item active" aria-current="page">
            <span class="tab-icon" aria-hidden="true">🗂</span>
            <span class="tab-label">Daten</span>
        </a>
    </nav>

    <script src="shared.js"></script>
    <script src="data.js"></script>
</body>
</html>
