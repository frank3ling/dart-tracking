<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Training Tracker – Würfe erfassen</title>
    <meta name="description" content="Kostenlose offline Dart-Trainings-App: Würfe erfassen, Trefferquote und Statistiken auswerten. Dart practice tracker with offline support.">
    <meta name="theme-color" content="#2c2c2c">
    <meta property="og:title" content="Dart Training Tracker">
    <meta property="og:description" content="Dart-Trainingswürfe erfassen und Trefferquote systematisch verbessern – offline, kostenlos, ohne Anmeldung.">
    <meta property="og:type" content="website">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-main app-main--play">
        <h1 class="sr-only">Dart Training – Wurf eingeben</h1>

        <!-- Aktueller Wurf Status -->
        <section class="current-throw">
            <div class="section-header">
                <h2>Aktueller Wurf</h2>
                <button type="button" id="undoBtn" class="undo-button" aria-label="Letzten Dart zurücksetzen" title="Letzten Dart zurücksetzen">
                    ↶
                </button>
            </div>
            <div class="throw-display-simple" id="throwDisplay" aria-live="polite">
                <span id="dart1">-</span>
                <span class="separator" aria-hidden="true">/</span>
                <span id="dart2">-</span>
                <span class="separator" aria-hidden="true">/</span>
                <span id="dart3">-</span>
            </div>
        </section>

        <!-- Eingabe Buttons -->
        <section class="input-section">
            <h2>Wurf eingeben</h2>
            <div class="input-buttons">
                <button type="button" class="input-btn single-btn" data-type="single">
                    Single
                </button>
                <button type="button" class="input-btn double-btn" data-type="double">
                    Double
                </button>
                <button type="button" class="input-btn triple-btn" data-type="triple">
                    Triple
                </button>
                <button type="button" class="input-btn miss-btn" data-type="miss">
                    Miss
                </button>
            </div>
        </section>

        <!-- Historie -->
        <section class="history-section">
            <h2>Letzte Würfe</h2>
            <div class="history-list" id="historyList">
                <div class="history-placeholder">Noch keine Würfe erfasst</div>
            </div>
        </section>

        <!-- Zielauswahl -->
        <section class="target-selection">
            <h2>Trainingsziel</h2>
            <div class="target-selector-inline">
                <label for="targetSelect">Aktuelles Ziel:</label>
                <select id="targetSelect" class="target-dropdown">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                    <option value="13">13</option>
                    <option value="14">14</option>
                    <option value="15">15</option>
                    <option value="16">16</option>
                    <option value="17">17</option>
                    <option value="18">18</option>
                    <option value="19">19</option>
                    <option value="20" selected>20</option>
                    <option value="25">25 (Bull)</option>
                </select>
            </div>
        </section>
    </main>

    <!-- Tab Navigation (Bottom) -->
    <nav class="tab-navigation" aria-label="Hauptnavigation">
        <a href="index.html" class="tab-item active" aria-current="page">
            <span class="tab-icon" aria-hidden="true">🎯</span>
            <span class="tab-label">Spiel</span>
        </a>
        <a href="stats.html" class="tab-item">
            <span class="tab-icon" aria-hidden="true">📊</span>
            <span class="tab-label">Statistik</span>
        </a>
        <a href="data.html" class="tab-item">
            <span class="tab-icon" aria-hidden="true">🗂</span>
            <span class="tab-label">Daten</span>
        </a>
    </nav>

    <script src="shared.js"></script>
    <script src="input.js"></script>
</body>
</html>
