name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unit-Tests
        run: node --test 'tests/*.test.js'

      - name: HTML validieren
        run: npx --yes html-validate index.html stats.html data.html

      - name: Manifest & Service-Worker-Version prüfen
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json'))"
          grep -q "CACHE_VERSION = 'v" sw.js
