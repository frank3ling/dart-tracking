name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Unit-Tests
        run: node --test 'tests/*.test.js'

      - name: Service-Worker-Version muss zum Tag passen
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! grep -q "CACHE_VERSION = '${TAG}'" sw.js; then
            echo "::error::CACHE_VERSION in sw.js muss '${TAG}' sein (Auto-Update der PWA)."
            exit 1
          fi

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
